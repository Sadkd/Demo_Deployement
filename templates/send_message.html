{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-lg p-4" style="max-width: 500px; width: 100%;">
        <h2 class="mb-4 text-center">Send a Message to Admin</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="content" class="form-label">Your Message</label>
                <textarea class="form-control" id="content" name="content" rows="5" placeholder="Enter your message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Message</button>
        </form>
    </div>
</div>
{% endblock %}
